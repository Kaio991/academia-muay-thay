<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Mestre - CT Muay Thai</title>
    
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="mestre.css"> 
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <span class="logo">CT <strong>MESTRE</strong></span>
            <button onclick="sair()" class="btn-sair">Sair</button>
        </nav>
    </header>

    <div class="admin-container">
        <h2>Gestão de Alunos</h2>

        <div class="dashboard-cards">
            <div class="card">
                <h3>Total de Alunos</h3>
                <p id="total-alunos">0</p>
            </div>
            <div class="card">
                <h3>Pendentes</h3>
                <p id="total-pendentes" style="color: #ff0000;">0</p>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="input-busca" placeholder="🔍 Buscar aluno por nome..." onkeyup="filtrarAlunos()">
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Prajied (Faixa)</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-alunos">
                </tbody>
        </table>
    </div>

    <script src="mestre.js"></script>
</body>
</html>
