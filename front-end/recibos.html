<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Caixa - CT Muay Thai</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <link rel="stylesheet" href="style.css"> 
    <style>
        .container-recibos { padding: 40px; max-width: 900px; margin: auto; }
        .tabela-dark { width: 100%; border-collapse: collapse; background: #111; color: #fff; margin-top: 20px; border-radius: 8px; overflow: hidden; }
        .tabela-dark th { background: #d32f2f; color: white; padding: 15px; text-align: left; text-transform: uppercase; }
        .tabela-dark td { padding: 15px; border-bottom: 1px solid #222; }
        .status-pago { color: #4caf50; font-weight: bold; }
        .btn-voltar { background: #333; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-bottom: 20px; border: none; cursor: pointer;}
        .btn-voltar:hover { background: #444; }
        
        /* Estilo do Botão PDF */
        .btn-pdf { 
            background: #d32f2f; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            float: right; 
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-pdf:hover { background: #b71c1c; }
    </style>
</head>
<body style="background-color: #050505;">

    <div class="container-recibos">
        <a href="mestre.html" class="btn-voltar">← Voltar ao Painel</a>
        
        <button onclick="gerarRelatorioPDF()" class="btn-pdf">
             Gerar Relatório PDF
        </button>

        <h1 style="color: #fff; border-left: 5px solid #d32f2f; padding-left: 15px;">Histórico de Recebimentos</h1>
        <p style="color: #888;">Registro oficial de mensalidades pagas</p>

        <table class="tabela-dark">
            <thead>
                <tr>
                    <th>Aluno</th>
                    <th>Data do Pagamento</th>
                    <th>Valor</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="lista-recibos">
                </tbody>
        </table>
    </div>

    <script src="recibos.js"></script>
</body>
</html>
